<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iBook — Estatísticas</title>
  <link rel="icon" href="assets/images/logo/logo-icon-ibook.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/visualizacao.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body class="d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark-custom sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="assets/images/logo/logo-horizontal.png" alt="iBook" class="navbar-logo">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html#destaques">Destaques</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#autores">Autores</a></li>
          <li class="nav-item"><a class="nav-link active" href="visualizacao.html"><i class="fa-solid fa-chart-bar me-1"></i>Estatísticas</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro_autor.html"><i class="fa-solid fa-plus me-1"></i>Cadastrar</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="flex-grow-1">
    <section class="secao-visualizacao py-5">
      <div class="container">
        <h2 class="secao-titulo mb-2"><span class="marcador"></span>Estatísticas dos Autores</h2>
        <p class="text-muted mb-5" style="font-size: 0.9rem;">Dados carregados em tempo real via API. Visualizações geradas com Chart.js.</p>

        <div class="row g-4">
          <div class="col-lg-6">
            <div class="grafico-card">
              <h3 class="grafico-titulo"><i class="fa-solid fa-book-open"></i>Autores por Gênero Literário</h3>
              <div class="grafico-wrapper">
                <canvas id="grafico-generos"></canvas>
              </div>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="grafico-card">
              <h3 class="grafico-titulo"><i class="fa-solid fa-users"></i>Top 5 Autores por Seguidores</h3>
              <div class="grafico-wrapper">
                <canvas id="grafico-seguidores"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer-custom py-4">
    <div class="container footer-inner">
      <img src="assets/images/logo/logo-horizontal.png" alt="iBook" class="footer-logo">
      <p class="mb-0"><strong>iBook</strong> &copy; 2025 — Todos os direitos reservados</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
